<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Solicitud de Crédito</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 5px;
        }
        .error {
            color: red;
            font-size: 0.9em;
            margin-bottom: 10px;
            display: block;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Solicitud de Crédito</h2>
    <form th:action="@{/credit/evaluate}" th:object="${creditRequest}" method="post">
        <h3>Datos del Cliente</h3>
        <label for="name">Nombre:</label>
        <input type="text" id="name" th:field="${creditRequest.customer.name}">
        <span class="error" th:errors="${creditRequest.customer.name}"></span>

        <label for="age">Edad:</label>
        <input type="number" id="age" th:field="${creditRequest.customer.age}">
        <span class="error" th:errors="${creditRequest.customer.age}"></span>

        <label for="monthlyIncome">Ingresos Mensuales:</label>
        <input type="number" id="monthlyIncome" th:field="${creditRequest.customer.monthlyIncome}" step="0.01">
        <span class="error" th:errors="${creditRequest.customer.monthlyIncome}"></span>

        <label for="creditScore">Puntaje Crediticio (0-1000):</label>
        <input type="number" id="creditScore" th:field="${creditRequest.customer.creditScore}">
        <span class="error" th:errors="${creditRequest.customer.creditScore}"></span>

        <h3>Datos del Crédito</h3>
        <label for="creditType">Tipo de Crédito:</label>
        <select id="creditType" th:field="${creditRequest.creditType}">
            <option value="">Seleccione</option>
            <option value="personal">Personal</option>
            <option value="hipotecario">Hipotecario</option>
            <option value="automotriz">Automotriz</option>
        </select>
        <span class="error" th:errors="${creditRequest.creditType}"></span>

        <label for="requestedAmount">Monto Solicitado:</label>
        <input type="number" id="requestedAmount" th:field="${creditRequest.requestAmount}" step="0.01">
        <span class="error" th:errors="${creditRequest.requestAmount}"></span>

        <button type="submit">Evaluar Solicitud</button>
    </form>
</div>
</body>
</html>
