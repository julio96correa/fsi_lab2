<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Resultado de Evaluación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .result-container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .approved {
            color: green;
        }
        .rejected {
            color: red;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #4CAF50;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="result-container">
    <h2>Resultado de la Evaluación</h2>
    <p>
        Estado:
        <span th:class="${creditResponse.approved} ? 'approved' : 'rejected'"
              th:text="${creditResponse.approved} ? 'Aprobado' : 'Rechazado'"></span>
    </p>
    <p th:if="${creditResponse.approved}">
        Monto Aprobado: <span th:text="'$' + ${#numbers.formatDecimal(creditResponse.approvedAmount, 0, 'COMMA', 2, 'POINT')}"></span>
    </p>
    <p th:if="${creditResponse.approved}">
        Tasa de Interés: <span th:text="${creditResponse.interestRate} + '%'"></span>
    </p>
    <p>Mensaje: <span th:text="${creditResponse.message}"></span></p>
    <a th:href="@{/credit/form}">Volver a solicitar</a>
</div>
</body>
</html>
